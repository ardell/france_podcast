<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1500" viewBox="0 0 1500 1500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b04b"/>
      <stop offset="45%" stop-color="#d98b3a"/>
      <stop offset="100%" stop-color="#7c5680"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a6d8c"/>
      <stop offset="100%" stop-color="#2f4a63"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1500" height="1500" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="750" cy="470" r="150" fill="#f6d98a" opacity="0.85"/>

  <!-- rolling hills -->
  <path d="M0,760 Q375,660 750,730 T1500,700 V1500 H0 Z" fill="#8a7a3f" opacity="0.9"/>
  <path d="M0,880 Q400,800 800,860 T1500,840 V1500 H0 Z" fill="#6f6a34"/>
  <path d="M0,1010 Q450,940 900,990 T1500,970 V1500 H0 Z" fill="#55632f"/>

  <!-- the river winding down -->
  <path d="M690,760 C640,900 860,980 800,1120 C760,1230 900,1300 850,1430"
        fill="none" stroke="url(#river)" stroke-width="46" stroke-linecap="round" opacity="0.92"/>

  <!-- title band -->
  <rect x="0" y="150" width="1500" height="250" fill="#2b2340" opacity="0.32"/>
  <text x="750" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="112" fill="#fff8ec" font-weight="bold" letter-spacing="2">COLORS OF</text>
  <text x="750" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="112" fill="#fff8ec" font-weight="bold" letter-spacing="2">PROVENCE</text>

  <!-- subtitle -->
  <text x="750" y="1300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="52" fill="#fff8ec" font-style="italic">A Traveler's Companion</text>
  <text x="750" y="1380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="40" fill="#f2e4cf" letter-spacing="6">ARLES · AVIGNON · LYON</text>
</svg>
